<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black" />
  <meta name="apple-mobile-web-app-title" content="Locations" />
  <meta name="application-name" content="Locations" />
  <link rel="apple-touch-icon" sizes="180x180" href="meade_locations_icon.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="meade_locations_icon.png" />
  <meta name="theme-color" content="#000000" />
  <title>Power Center Location Search</title>

  <style>
    :root {
      --bg: #f3f5f8;
      --card: #ffffff;
      --text: #111827;
      --muted: #6b7280;
      --border: #e5e7eb;
      --accent: #1d4ed8;
      --accent-hover: #1e40af;
      --shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --radius-xl: 24px;
      --radius-lg: 18px;
      --radius-md: 14px;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      background: linear-gradient(180deg, #f8fafc 0%, #eef2f7 100%);
      color: var(--text);
      font-family: Inter, -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    body {
      padding-top: var(--safe-top);
      padding-bottom: var(--safe-bottom);
    }

    .wrap {
      max-width: 840px;
      margin: 0 auto;
      padding: 16px;
    }

    .card {
      background: rgba(255,255,255,0.78);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.72);
      border-radius: 28px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .header {
      position: sticky;
      top: 0;
      z-index: 1000;
      text-align: center;
      padding: 12px 18px 14px;
      background: rgba(248,250,252,0.92);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border-bottom: 1px solid rgba(229,231,235,0.85);
    }

    .header img {
      width: 120px;
      max-width: 42vw;
      height: auto;
      margin: 2px auto 8px;
      display: block;
      opacity: 0.96;
    }

    h1 {
      margin: 0;
      font-size: 24px;
      line-height: 1.2;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .sub {
      margin: 10px auto 0;
      max-width: 640px;
      color: var(--muted);
      line-height: 1.45;
      font-size: 14px;
    }

    .controls {
      position: sticky;
      top: 120px;
      z-index: 999;
      padding: 14px 16px 12px;
      background: rgba(248,250,252,0.94);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border-bottom: 1px solid rgba(229,231,235,0.85);
    }

    .search-wrap {
      position: relative;
      max-width: 720px;
      margin: 0 auto;
    }

    .search-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 16px;
      color: #9ca3af;
      pointer-events: none;
    }

    .search {
      width: 100%;
      padding: 15px 18px 15px 42px;
      border: 1px solid rgba(203,213,225,0.9);
      border-radius: 16px;
      font-size: 16px;
      outline: none;
      background: rgba(255,255,255,0.96);
      box-shadow: 0 4px 14px rgba(15, 23, 42, 0.05);
      transition: border-color .15s ease, box-shadow .15s ease, transform .15s ease;
      -webkit-appearance: none;
      appearance: none;
    }

    .search:focus {
      border-color: rgba(37,99,235,0.55);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.12), 0 8px 20px rgba(15,23,42,0.07);
      transform: translateY(-1px);
    }

    .meta {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      color: var(--muted);
      font-size: 13px;
      flex-wrap: wrap;
      max-width: 720px;
      margin: 10px auto 0;
      padding: 0 2px;
    }

    .pill {
      display: inline-block;
      background: #eff6ff;
      color: #1d4ed8;
      border: 1px solid #bfdbfe;
      padding: 5px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: .01em;
    }

    .table-wrap {
      overflow: auto;
      max-height: calc(100vh - 260px);
      padding: 6px 0 0;
      -webkit-overflow-scrolling: touch;
    }

    table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0 10px;
      min-width: 760px;
      padding: 0 14px 14px;
    }

    thead th {
      position: sticky;
      top: 0;
      z-index: 1;
      background: transparent;
      text-align: left;
      font-size: 12px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--muted);
      padding: 8px 16px 4px;
      border-bottom: none;
    }

    tbody td {
      padding: 14px 16px;
      vertical-align: middle;
      font-size: 14px;
      background: rgba(255,255,255,0.96);
      border-top: 1px solid #eef2f7;
      border-bottom: 1px solid #eef2f7;
    }

    tbody td:first-child {
      border-left: 1px solid #eef2f7;
      border-top-left-radius: 16px;
      border-bottom-left-radius: 16px;
      font-weight: 700;
    }

    tbody td:last-child {
      border-right: 1px solid #eef2f7;
      border-top-right-radius: 16px;
      border-bottom-right-radius: 16px;
    }

    tbody tr:hover td {
      background: #fbfdff;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 42px;
      text-decoration: none;
      background: var(--accent);
      color: #fff;
      padding: 10px 14px;
      border-radius: 12px;
      font-weight: 700;
      white-space: nowrap;
      box-shadow: 0 6px 16px rgba(37,99,235,0.22);
      transition: transform .12s ease, background .12s ease, box-shadow .12s ease;
      -webkit-tap-highlight-color: transparent;
    }

    .btn:hover { background: var(--accent-hover); }
    .btn:active {
      transform: scale(0.98);
      box-shadow: 0 4px 10px rgba(37,99,235,0.18);
    }

    .empty {
      padding: 36px 24px 40px;
      color: var(--muted);
      text-align: center;
      font-size: 15px;
    }

    @media (max-width: 768px) {
      .wrap {
        padding: 10px;
      }

      .card {
        border-radius: 24px;
      }

      .header {
        padding: 10px 14px 12px;
      }

      .header img {
        width: 96px;
        margin-bottom: 6px;
      }

      h1 {
        font-size: 22px;
      }

      .sub {
        font-size: 13px;
      }

      .controls {
        top: 98px;
        padding: 12px 12px 10px;
      }

      .table-wrap {
        max-height: none;
        overflow: visible;
        padding: 10px 12px 16px;
      }

      table, thead, tbody, th, td, tr {
        display: block;
        min-width: 0;
      }

      thead {
        display: none;
      }

      tbody {
        display: grid;
        gap: 12px;
      }

      tbody tr {
        background: rgba(255,255,255,0.98);
        border: 1px solid #eef2f7;
        border-radius: 18px;
        box-shadow: 0 8px 18px rgba(15, 23, 42, 0.05);
        overflow: hidden;
      }

      tbody td {
        border: none !important;
        border-radius: 0 !important;
        padding: 10px 14px;
        display: flex;
        justify-content: space-between;
        gap: 12px;
        align-items: center;
        background: transparent;
      }

      tbody td::before {
        content: attr(data-label);
        color: var(--muted);
        font-size: 12px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: .04em;
      }

      tbody td:first-child {
        padding-top: 14px;
        font-size: 16px;
      }

      tbody td:last-child {
        padding-bottom: 14px;
      }

      .btn {
        width: 100%;
      }
    }
  
    

  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="header">
        
        <a href="index.html"><img src="meade_logo.jpg" alt="Meade Logo"></a>
        <h1>Power Center Location Search</h1>
        <p class="sub">Search the <strong>Location #</strong> field, then click <strong>Open Map</strong> to launch the Google Maps link for that location.</p>
      </div>

      <div class="controls">
        <div class="search-floating">
          <div class="search-wrap">
            <span class="search-icon">⌕</span>
            <input id="searchInput" class="search" type="text" placeholder="Enter Location #..." autocomplete="off" />
          </div>
          <div class="mode-toggle" style="display:flex;gap:10px;align-items:center;margin-top:10px;max-width:720px;margin-left:auto;margin-right:auto;">
            <label style="font-size:13px;color:#6b7280;font-weight:600;">Match mode:</label>
            <select id="matchMode" style="padding:8px 10px;border-radius:10px;border:1px solid #d1d5db;font-size:14px;">
              <option value="exact">Exact</option>
              <option value="startsWith">Starts With</option>
            </select>
          </div>
        </div>

        <div class="meta">
          <div><span class="pill">Searchable field: Location #</span></div>
          <div id="resultCount">Loading…</div>
        </div>
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              
              <th>Location #</th><th>PC</th>
              <th>Latitude</th>
              <th>Longitude</th>
              <th>Map Link</th>
            </tr>
          </thead>
          <tbody id="resultsBody"></tbody>
        </table>
        <div id="emptyState" class="empty" style="display:none;">No matching locations found.</div>
      </div>
    </div>
  </div>

    const searchInput = document.getElementById('searchInput');
    const matchMode = document.getElementById('matchMode');
    const resultsBody = document.getElementById('resultsBody');
    const emptyState = document.getElementById('emptyState');
    const resultCount = document.getElementById('resultCount');

    function formatNumber(value) {
      if (value === null || value === undefined || value === '') return '';
      const num = Number(value);
      return Number.isFinite(num) ? num.toString() : String(value);
    }

    function renderRows(rows) {
      resultsBody.innerHTML = '';

      if (!rows.length) {
        emptyState.style.display = 'block';
      } else {
        emptyState.style.display = 'none';
      }

      const fragment = document.createDocumentFragment();

      rows.forEach((row) => {
        const tr = document.createElement('tr');

        const fields = [
          
          ['Location', row.location], ['PC', row.pc],
          ['Latitude', formatNumber(row.latitude)],
          ['Longitude', formatNumber(row.longitude)],
        ];

        fields.forEach(([label, value]) => {
          const td = document.createElement('td');
          td.setAttribute('data-label', label);
          td.textContent = value ?? '';
          tr.appendChild(td);
        });

        const linkTd = document.createElement('td');
        linkTd.setAttribute('data-label', 'Map Link');
        if (row.map_link) {
          const link = document.createElement('a');
          link.href = row.map_link;
          link.className = 'btn';
          link.target = '_blank';
          link.rel = 'noopener noreferrer';
          link.textContent = 'Open Map';
          linkTd.appendChild(link);
        }
        tr.appendChild(linkTd);

        fragment.appendChild(tr);
      });

      resultsBody.appendChild(fragment);
      resultCount.textContent = `${rows.length.toLocaleString()} result${rows.length === 1 ? '' : 's'}`;
    }

    function applySearch() {
      const query = searchInput.value.trim().toLowerCase();
      const mode = matchMode.value;

      let filtered = allRows;

      if (query) {
        filtered = filtered.filter((row) => {
          const value = String(row.location || '').trim().toLowerCase();
          if (mode === 'exact') return value === query;
          if (mode === 'startsWith') return value.startsWith(query);
          return value.includes(query);
        });
      }

      renderRows(filtered);
    }

    searchInput.addEventListener('input', applySearch);
    matchMode.addEventListener('change', applySearch);

    renderRows(allRows);
  </script>
